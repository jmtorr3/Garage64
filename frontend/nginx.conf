server {
    listen 3264;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to Django
    location /garage64/api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback — all routes under /garage64/ serve index.html
    location /garage64/ {
        try_files $uri $uri/ /garage64/index.html;
    }

    # Redirect root to app
    location = / {
        return 301 /garage64/;
    }
}
